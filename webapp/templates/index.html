<!DOCTYPE html>
<html>
<head>
    <title>Skin Disease Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
            background-color: #f2f2f2;
        }

        h1 {
            color: #333;
        }

        .upload-form {
            margin-top: 20px;
        }

        input[type="file"] {
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #45a049;
        }

        .result {
            margin-top: 30px;
            font-size: 18px;
        }

        .result img {
            margin-top: 20px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .warning {
            color: red;
        }
    </style>
</head>
<body>
    <h1>🩺 Skin Disease Prediction</h1>
    <form class="upload-form" method="POST" enctype="multipart/form-data">
        <input type="file" name="image" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
    <div class="result">
        <p>{{ prediction|safe }}</p>
        <img src="{{ url_for('static', filename='uploads/' + image) }}" alt="Uploaded Image">
    </div>
    {% endif %}
</body>
</html>
